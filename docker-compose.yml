services:
  postgres:
    image: postgres:15-alpine
    container_name: marketplace_postgres
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: marketplace
      POSTGRES_PASSWORD: marketplace
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketplace -d marketplace"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marketplace_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Marketplace: "Host=postgres;Port=5432;Database=marketplace;Username=marketplace;Password=marketplace;Pooling=true;Maximum Pool Size=100"
    ports:
      - "8080:8080"

  adminer:
    image: adminer:4
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  pgdata:
